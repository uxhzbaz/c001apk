name: main

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
  watch:
    types: [ started ]
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '**.md'
      - '**.txt'
      - '.github/**'
      - '.idea/**'
      - '!.github/workflows/**'

      # only one run
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Gradle wrapper validation
        uses: gradle/wrapper-validation-action@main

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@main

      - name: Set up JDK
        uses: actions/setup-java@main
        with:
          java-version: 17
          distribution: temurin
          cache: "gradle"

      - name: Set Gradle Conf
        run: |
          mkdir -p ~/.gradle/
          echo 'org.gradle.parallel=true' >> ~/.gradle/gradle.properties

          echo 'org.gradle.daemon=true' >> ~/.gradle/gradle.properties
          echo 'org.gradle.jvmargs=-XX:+UseParallelGC -Xmx6g -Xms256m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 ' >> ~/.gradle/gradle.properties
          echo 'org.gradle.workers.max=2' >> ~/.gradle/gradle.properties
          echo 'kotlin.incremental=false' >> ~/.gradle/gradle.properties
          echo 'kotlin.compiler.execution.strategy=in-process' >> ~/.gradle/gradle.properties
          echo 'org.gradle.caching=true' >> ~/.gradle/gradle.properties
          echo 'org.gradle.configureondemand=true' >> ~/.gradle/gradle.properties

          # 配置缓存
          echo 'org.gradle.unsafe.configuration-cache=true' >> ~/.gradle/gradle.properties
          echo 'org.gradle.unsafe.configuration-cache-problems=warn' >> ~/.gradle/gradle.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Get VersionCode
        run: |
          version_code=$(git rev-parse --short HEAD)
          echo "version_code: $version_code"
          echo "version_code=$version_code" >> $GITHUB_ENV
          version_number=$(git rev-list --count HEAD)
          echo "version_number: $version_number"
          echo "version_number=$version_number" >> $GITHUB_ENV

      - name: Build with Gradle
        run: |
          ./gradlew :app:assembleRelease -x lint -x lintVitalRelease \
          --build-cache --parallel --no-daemon \
          -x test -x checkReleaseAarMetadata \
          -x checkKotlinGradlePluginConfigurationErrors \
          -x checkReleaseDuplicateClasses
#        env:
#          KEYSTORE_PATH: "../keystore.jks"
#          KEYSTORE_PASSWORD: 123456
#          KEY_ALIAS: 123456
#          KEY_PASSWORD: 123456

#      - name: Upload Artifacts
#        uses: actions/upload-artifact@main
#        # don't upload the artifacts if it's a pull request
##        if: ${{ !github.event.pull_request }}
#        with:
#          path: './app/build/outputs/**/*.apk'
#          name: build_output_${{ github.event.head_commit.id }}.zip

      - name: 获取当前时间
        uses: srfrnk/current-time@master
        id: current-time
        with:
          format: YYYY/MM/DD

#      - name: 上传
#        uses: "marvinpinto/action-automatic-releases@latest"
#        with:
#          repo_token: "${{ secrets.GITHUB_TOKEN }}"
#          automatic_release_tag: "build_android_${{steps.current-time.outputs.formattedTime}}-${{ env.version_code }}"
#          prerelease: true
#          files: ./app/build/outputs/**/*.apk

      - name: Delete Pre-Release
        run: |
          if gh release view beta &>/dev/null; then
            gh release delete beta -y
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update beta tag
        uses: richardsimko/update-tag@v1
        with:
          tag_name: beta
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Pre-Release
        uses: ncipollo/release-action@v1
        with:
          name: "build_android_${{steps.current-time.outputs.formattedTime}}-${{ env.version_code }}-${{ env.version_number }}"
          tag: "beta"
          body: "beta ${{steps.current-time.outputs.formattedTime}}-${{ env.version_code }}-${{ env.version_number }}"
          prerelease: true
          artifacts: ./app/build/outputs/**/*.apk

      - name: Delete Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 3

name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - '.github/**'
      - '.idea/**'
      - '!.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gradle wrapper validation
        uses: gradle/actions/wrapper-validation@v3

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: gradle

      - name: Write key
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          if [ ! -z "${{ secrets.SIGN_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.SIGN_KEYSTORE_BASE64 }}" | base64 --decode > key.jks
            echo KEYSTORE_PATH='${{ github.workspace }}/key.jks' >> local.properties
            echo KEYSTORE_PASSWORD='${{ secrets.KEYSTORE_PASSWORD }}' >> local.properties
            echo KEY_ALIAS='${{ secrets.KEY_ALIAS }}' >> local.properties
            echo KEY_PASSWORD='${{ secrets.KEY_PASSWORD }}' >> local.properties
          fi

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4.0.2
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            !~/.gradle/caches/build-cache-*
          key: gradle-deps-core-${{ hashFiles('**/build.gradle.kts', '**/build.gradle', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-deps

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release
        id: buildRelease
        run: |
          ./gradlew :app:assembleRelease
          echo "releaseName=$(ls app/build/outputs/apk/release/*.apk | awk -F '(/|\\.apk)' '{print $6}')" >> $GITHUB_OUTPUT

      - name: Upload release
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.buildRelease.outputs.releaseName }}
          path: "app/build/outputs/apk/release/*.apk"

      - name: Upload mappings
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mappings
          path: "app/build/outputs/mapping/release"

      - name: Build debug
        id: buildDebug
        run: |
          ./gradlew :app:assembleDebug
          echo "debugName=$(ls app/build/outputs/apk/debug/*.apk | awk -F '(/|\\.apk)' '{print $6}')" >> $GITHUB_OUTPUT

      - name: Upload debug
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.buildDebug.outputs.debugName }}
          path: "app/build/outputs/apk/debug/*.apk"



name: c001apk-Kotlin-Java-Android

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - '.github/**'
      - '.idea/**'
      - '!.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract c001apk-Kotlin-Java.tar.xz
        run: |
          tar -xvf c001apk-Kotlin-Java.tar.xz

      - name: Set working directory
        run: echo "PROJECT_DIR=c001apk-Kotlin-Java" >> $GITHUB_ENV

      - name: Gradle wrapper validation
        uses: gradle/actions/wrapper-validation@v3
        with:
          working-directory: ${{ env.PROJECT_DIR }}

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: gradle

      - name: Write key
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ ! -z "${{ secrets.SIGN_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.SIGN_KEYSTORE_BASE64 }}" | base64 --decode > key.jks
            echo KEYSTORE_PATH='${{ github.workspace }}/${{ env.PROJECT_DIR }}/key.jks' >> local.properties
            echo KEYSTORE_PASSWORD='${{ secrets.KEYSTORE_PASSWORD }}' >> local.properties
            echo KEY_ALIAS='${{ secrets.KEY_ALIAS }}' >> local.properties
            echo KEY_PASSWORD='${{ secrets.KEY_PASSWORD }}' >> local.properties
          fi

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4.0.2
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            !~/.gradle/caches/build-cache-*
          key: gradle-deps-core-${{ hashFiles('**/build.gradle.kts', '**/build.gradle', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-deps

      - name: Grant execute permission for gradlew
        working-directory: ${{ env.PROJECT_DIR }}
        run: chmod +x gradlew

      # Build release
      - name: Build release
        id: buildRelease
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          ./gradlew :app:assembleRelease
          echo "releaseName=$(ls app/build/outputs/apk/release/*.apk | awk -F '(/|\\.apk)' '{print $6}')" >> $GITHUB_OUTPUT

      # Pack release APKs into tar.xz
      - name: Pack release APKs with xz
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          cd app/build/outputs/apk/release
          tar -cvf - *.apk | xz -9 -T8 > release_apks.tar.xz

      - name: Upload release APKs (tar.xz)
        uses: actions/upload-artifact@v4
        with:
          name: release_apks_xz
          path: "${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/release_apks.tar.xz"

      - name: Upload release APKs (original)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.buildRelease.outputs.releaseName }}
          path: "${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk"

      - name: Upload mappings
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mappings
          path: "${{ env.PROJECT_DIR }}/app/build/outputs/mapping/release"

      # Build debug
      - name: Build debug
        id: buildDebug
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          ./gradlew :app:assembleDebug
          echo "debugName=$(ls app/build/outputs/apk/debug/*.apk | awk -F '(/|\\.apk)' '{print $6}')" >> $GITHUB_OUTPUT

      # Pack debug APKs into tar.xz
      - name: Pack debug APKs with xz
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          cd app/build/outputs/apk/debug
          tar -cvf - *.apk | xz -9 -T8 > debug_apks.tar.xz

      - name: Upload debug APKs (tar.xz)
        uses: actions/upload-artifact@v4
        with:
          name: debug_apks_xz
          path: "${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/debug_apks.tar.xz"

      - name: Upload debug APKs (original)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.buildDebug.outputs.debugName }}
          path: "${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk"