name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - '.github/**'
      - '.idea/**'
      - '!.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract project archive
        run: tar -xJf c001apk-Kotlin-Java.tar.xz

      - name: Move into project directory
        run: echo "PROJECT_DIR=$(pwd)/c001apk-Kotlin-Java" >> $GITHUB_ENV

      - name: Gradle wrapper validation
        uses: gradle/actions/wrapper-validation@v3
        with:
          gradle-version: wrapper
          build-root-directory: ${{ env.PROJECT_DIR }}

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: gradle

      - name: Write key
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          if [ ! -z "${{ secrets.SIGN_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.SIGN_KEYSTORE_BASE64 }}" | base64 --decode > "${{ env.PROJECT_DIR }}/key.jks"
            echo KEYSTORE_PATH='${{ github.workspace }}/c001apk-Kotlin-Java/key.jks' >> "${{ env.PROJECT_DIR }}/local.properties"
            echo KEYSTORE_PASSWORD='${{ secrets.KEYSTORE_PASSWORD }}' >> "${{ env.PROJECT_DIR }}/local.properties"
            echo KEY_ALIAS='${{ secrets.KEY_ALIAS }}' >> "${{ env.PROJECT_DIR }}/local.properties"
            echo KEY_PASSWORD='${{ secrets.KEY_PASSWORD }}' >> "${{ env.PROJECT_DIR }}/local.properties"
          fi

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4.0.2
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            !~/.gradle/caches/build-cache-*
          key: gradle-deps-core-${{ hashFiles('c001apk-Kotlin-Java/**/build.gradle.kts', 'c001apk-Kotlin-Java/**/build.gradle', 'c001apk-Kotlin-Java/**/libs.versions.toml') }}
          restore-keys: |
            gradle-deps

      - name: Grant execute permission for gradlew
        run: chmod +x ${{ env.PROJECT_DIR }}/gradlew

      - name: Build release
        id: buildRelease
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          ./gradlew :app:assembleRelease
          echo "releaseName=$(ls app/build/outputs/apk/release/*.apk | awk -F '(/|\\.apk)' '{print $6}')" >> $GITHUB_OUTPUT

      - name: Upload release
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.buildRelease.outputs.releaseName }}
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk

      - name: Upload mappings
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mappings
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/mapping/release

      - name: Build debug
        id: buildDebug
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          ./gradlew :app:assembleDebug
          echo "debugName=$(ls app/build/outputs/apk/debug/*.apk | awk -F '(/|\\.apk)' '{print $6}')" >> $GITHUB_OUTPUT

      - name: Upload debug
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.buildDebug.outputs.debugName }}
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk