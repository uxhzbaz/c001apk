name: c001apk-Kotlin-Java-Android

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - '.github/**'
      - '.idea/**'
      - '!.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract c001apk-Kotlin-Java.tar.xz
        run: tar -xvf c001apk-Kotlin-Java.tar.xz

      - name: Set working directory
        run: echo "PROJECT_DIR=c001apk-Kotlin-Java" >> $GITHUB_ENV

      - name: Gradle wrapper validation
        uses: gradle/actions/wrapper-validation@v3
        with:
          working-directory: ${{ env.PROJECT_DIR }}

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: gradle

      - name: Write key
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ ! -z "${{ secrets.SIGN_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.SIGN_KEYSTORE_BASE64 }}" | base64 --decode > key.jks
            echo KEYSTORE_PATH='${{ github.workspace }}/${{ env.PROJECT_DIR }}/key.jks' >> local.properties
            echo KEYSTORE_PASSWORD='${{ secrets.KEYSTORE_PASSWORD }}' >> local.properties
            echo KEY_ALIAS='${{ secrets.KEY_ALIAS }}' >> local.properties
            echo KEY_PASSWORD='${{ secrets.KEY_PASSWORD }}' >> local.properties
          fi

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4.0.2
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            !~/.gradle/caches/build-cache-*
          key: gradle-deps-core-${{ hashFiles('**/build.gradle.kts', '**/build.gradle', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-deps

      - name: Grant execute permission for gradlew
        working-directory: ${{ env.PROJECT_DIR }}
        run: chmod +x gradlew

      - name: Build release
        id: buildRelease
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          ./gradlew :app:assembleRelease
          echo "releaseName=$(ls app/build/outputs/apk/release/*.apk | awk -F '(/|\\.apk)' '{print $6}')" >> $GITHUB_OUTPUT

      - name: Pack release APKs with xz
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          cd app/build/outputs/apk/release
          tar -cvf - *.apk | xz -9 -T8 > release_apks.tar.xz

      - name: Upload release APKs (tar.xz)
        uses: actions/upload-artifact@v4
        with:
          name: release_apks_xz
          path: "${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/release_apks.tar.xz"

      - name: Upload release APKs (original)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.buildRelease.outputs.releaseName }}
          path: "${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk"

      - name: Upload mappings
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mappings
          path: "${{ env.PROJECT_DIR }}/app/build/outputs/mapping/release"

      - name: Build debug
        id: buildDebug
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          ./gradlew :app:assembleDebug
          echo "debugName=$(ls app/build/outputs/apk/debug/*.apk | awk -F '(/|\\.apk)' '{print $6}')" >> $GITHUB_OUTPUT

      - name: Pack debug APKs with xz
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          cd app/build/outputs/apk/debug
          tar -cvf - *.apk | xz -9 -T8 > debug_apks.tar.xz

      - name: Upload debug APKs (tar.xz)
        uses: actions/upload-artifact@v4
        with:
          name: debug_apks_xz
          path: "${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/debug_apks.tar.xz"

      - name: Upload debug APKs (original)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.buildDebug.outputs.debugName }}
          path: "${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk"